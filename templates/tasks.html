<!DOCTYPE html>
<html>
<head>
  <title>Manage Orders</title>

<style>
html,body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif;}
.auto-grow, .auto-grow-task {width:100%; overflow:hidden; resize:none;}
</style>

</div>

<nav class="w3-sidebar w3-collapse sb-sidebar w3-animate-left" style="z-index:3;width:300px;" id="mySidebar"><br>
  <div class="w3-container w3-row">
    <div class="w3-col s4">
      <img src="/w3images/avatar2.png" class="w3-circle w3-margin-right" style="width:46px">
    </div>
    <div class="w3-col s8 w3-bar">
      <span>Welcome, <strong>Brittany</strong></span><br>
      <a href="#" class="w3-bar-item w3-button"><i class="fa fa-envelope"></i></a>
      <a href="#" class="w3-bar-item w3-button"><i class="fa fa-user"></i></a>
      <a href="#" class="w3-bar-item w3-button"><i class="fa fa-cog"></i></a>
    </div>
  </div>
  <hr>

  <div class="w3-container">
    <h5 class="sb-heading">Dashboard</h5>
  </div>

  <div class="w3-bar-block">
    <a href="#" class="w3-bar-item w3-button w3-padding-16 w3-hide-large w3-hover-black" onclick="w3_close()">
      <i class="fa fa-remove fa-fw"></i> Close Menu
    </a>

    <a href="/" class="w3-bar-item w3-button w3-padding">
      <i class="fa fa-dashboard fa-fw"></i> Home Dashboard
    </a>

    <a href="/orders" class="w3-bar-item w3-button w3-padding sb-active">
      <i class="fa fa-shopping-bag fa-fw"></i> Manage Orders
    </a>

    <a href="#" class="w3-bar-item w3-button w3-padding">
      <i class="fa fa-cubes fa-fw"></i> Inventory

<div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" style="cursor:pointer" id="myOverlay"></div>

<div class="w3-main" style="margin-left:300px;margin-top:43px">

  <header class="w3-container" style="padding-top:22px">
    <h3 class="sb-heading"><b><i class="fa fa-shopping-bag"></i> Manage Orders</b></h3>
    <p class="sb-subtle">Track customer orders from Fiverr, Square, Google Sheets, and manual entries.</p>
  </header>

<div class="w3-container">
<table class="w3-table w3-striped w3-bordered w3-white">
  <tr class="w3-teal">
    <th>Project</th>
    <th>Task</th>
    <th>Priority</th>
    <th>Start</th>
    <th>End</th>
    <th>Done</th>
    <th>Budget</th>
  </tr>

  <!-- Customer 1 -->
  <tr class="w3-light-grey">
    <td colspan="7"><b>ANITA NJIWAH</b></td>
  </tr>

  <tr class="task-first-row">
    <td rowspan="2"><textarea class="w3-input w3-border auto-grow">4 Products - Cleanser, Body Scrub</textarea></td>
    <td><textarea class="w3-input w3-border auto-grow-task">Cleanser face</textarea></td>
    <td>
      <select class="w3-select w3-border">
        <option value="">Priority</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
    </td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input type="checkbox"></td>
    <td rowspan="2"><textarea class="w3-input w3-border auto-grow" placeholder="$"></textarea></td>
  </tr>

  <tr>
    <td><textarea class="w3-input w3-border auto-grow-task">Body scrub</textarea></td>
    <td>
      <select class="w3-select w3-border">
        <option value="">Priority</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
    </td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input type="checkbox"></td>
  </tr>

  <!-- Add Task Button -->
  <tr>
    <td colspan="6" style="text-align:center;">
      <button class="w3-button w3-small w3-green" onclick="addCustomerTask(this)">+ Add Task</button>
    </td>
    <td></td>
  </tr>

  <!-- Customer 2 -->
  <tr class="w3-light-grey">
    <td colspan="7"><b>BRANDON UMAMI</b></td>
  </tr>

  <tr class="task-first-row">
    <td rowspan="1"><textarea class="w3-input w3-border auto-grow">2 Products - Lipstick, Mascara</textarea></td>
    <td><textarea class="w3-input w3-border auto-grow-task">Lipstick red</textarea></td>
    <td>
      <select class="w3-select w3-border">
        <option value="">Priority</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
    </td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input type="checkbox"></td>
    <td rowspan="1"><textarea class="w3-input w3-border auto-grow" placeholder="$"></textarea></td>
  </tr>

  <tr>
    <td colspan="6" style="text-align:center;">
      <button class="w3-button w3-small w3-green" onclick="addCustomerTask(this)">+ Add Task</button>
    </td>
    <td></td>
  </tr>

</div>

<script>
function attachAutoGrow(textarea) {
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
  });
  textarea.style.height = textarea.scrollHeight + 'px';
}
document.querySelectorAll('.auto-grow, .auto-grow-task').forEach(attachAutoGrow);

function addCustomerTask(button) {
  const addButtonRow = button.closest('tr');
  const table = addButtonRow.closest('table');

  // Find the first task row in this project
  let firstRow = addButtonRow.previousElementSibling;
  while (!firstRow.classList.contains('task-first-row')) {
    firstRow = firstRow.previousElementSibling;
  }

  const projectCell = firstRow.querySelector('td[rowspan]');
  const budgetCell = firstRow.querySelectorAll('td[rowspan]')[1];

  // Increase rowspan
  projectCell.rowSpan = parseInt(projectCell.rowSpan) + 1;
  budgetCell.rowSpan = parseInt(budgetCell.rowSpan) + 1;

  // Create new task row
  const newRow = document.createElement('tr');
  newRow.innerHTML = `
    <td><textarea class="w3-input w3-border auto-grow-task" placeholder="Task name"></textarea></td>
    <td>
      <select class="w3-select w3-border">
        <option value="">Priority</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
    </td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input class="w3-input w3-border" type="date"></td>
    <td><input type="checkbox"></td>
  `;

  // Insert new task above the Add Task button
  addButtonRow.before(newRow);

  attachAutoGrow(newRow.querySelector('textarea'));
}
</script>

</body>
</html>
