<!DOCTYPE html>
<html>
<head>
  <title>Add Order</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>
    html, body, h1, h2, h3, h4, h5 { font-family: "Raleway", sans-serif; }
    body { background-color: #f6f3ee; color: #4f4a45; }
    .sb-topbar { background: linear-gradient(to right, #e7d8c3, #f3eadc); color: #5f5a54; border-bottom: 2px solid #d7c3aa; }
    .sb-topbar .w3-bar-item { color: #5f5a54 !important; font-weight: 600; }
    .sb-sidebar { background-color: #fcfaf7; color: #5f5a54; border-right: 1px solid #eadfce; }
    .sb-sidebar .w3-bar-item { color: #5f5a54; font-weight: 500; }
    .sb-sidebar .w3-bar-item:hover { background-color: #d7ece8 !important; color: #4c4a46 !important; }
    .sb-active { background-color: #bfe3df !important; color: #4c4a46 !important; font-weight: bold; }
    .sb-panel { background-color: #ffffff; color: #4f4a45; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
    .sb-heading { color: #7c746c; }
    .sb-subtle { color: #7a746d; }
    .sb-button { background-color: #bfe3df; color: #4c4a46; border: none; }
    .sb-button-warm { background-color: #e8d5bd; color: #4c4a46; border: none; }
    .sb-button-danger { background-color: #f0e7dc; color: #d32f2f; border: none; }
    .error-message { color: #d32f2f; background-color: #ffebee; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    .success-message { color: #388e3c; background-color: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    .product-row { background-color: #f9f7f4; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    .remove-product { cursor: pointer; color: #d32f2f; margin-left: 10px; }
    .add-product-btn { margin-top: 10px; }
  </style>
</head>
<body>

<div class="w3-bar w3-top w3-large sb-topbar" style="z-index:4">
  <button class="w3-bar-item w3-button w3-hide-large" onclick="w3_open()"><i class="fa fa-bars"></i> Menu</button>
  <span class="w3-bar-item w3-right">ShyneBeauty</span>
</div>

<nav class="w3-sidebar w3-collapse sb-sidebar w3-animate-left" style="z-index:3;width:300px;" id="mySidebar"><br>
  <div class="w3-container"><h5 class="sb-heading">Dashboard</h5></div>
  <div class="w3-bar-block">
    <a href="/" class="w3-bar-item w3-button w3-padding">Home Dashboard</a>
    <a href="/add-order" class="w3-bar-item w3-button w3-padding sb-active">Add New</a>
  </div>
</nav>

<div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" id="myOverlay"></div>

<div class="w3-main" style="margin-left:300px;margin-top:43px">
  <header class="w3-container" style="padding-top:22px">
    <h3 class="sb-heading"><b><i class="fa fa-shopping-cart"></i> Add Order</b></h3>
    <p class="sb-subtle">Enter new order information below.</p>
  </header>

  <div class="w3-container sb-panel w3-padding w3-margin">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="{% if category == 'error' %}error-message{% else %}success-message{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('add_order') }}" id="orderForm">
      <!-- Order Information -->
      <label><b>Customer *</b></label>
      <select class="w3-select w3-border w3-margin-bottom" name="customer_id" required>
        <option value="">Select Customer</option>
        {% for customer in customers %}
          <option value="{{ customer.id }}">{{ customer.first_name }} {{ customer.last_name }} - {{ customer.email }}</option>
        {% endfor %}
      </select>

      <label><b>Platform/Source *</b></label>
      <select class="w3-select w3-border w3-margin-bottom" name="platform" required>
        <option value="">Select Source</option>
        <option value="Fiverr">Fiverr</option>
        <option value="Square">Square</option>
        <option value="Google Sheets">Google Sheets</option>
      </select>

      <label><b>Status</b></label>
      <select class="w3-select w3-border w3-margin-bottom" name="status">
        <option value="New">New</option>
        <option value="In Progress">In Progress</option>
        <option value="Waiting for Ingredients">Waiting for Ingredients</option>
        <option value="Packed">Packed</option>
        <option value="Shipped">Shipped</option>
        <option value="Completed">Completed</option>
      </select>

      <label><b>Order Date</b></label>
      <input class="w3-input w3-border w3-margin-bottom" type="date" name="placed_at" value="{{ today }}">

      <!-- Products Section -->
      <label><b>Products</b></label>
      <div id="products-container">
        <div class="product-row" id="product-1">
          <div class="w3-row-padding">
            <div class="w3-half">
              <label>Product</label>
              <select class="w3-select w3-border" name="product_id[]" required>
                <option value="">Select Product</option>
                {% for product in products %}
                  <option value="{{ product.id }}">{{ product.name }} (SKU: {{ product.sku }}) - ${{ "%.2f"|format(product.price) }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="w3-third">
              <label>Quantity</label>
              <input class="w3-input w3-border" type="number" name="quantity[]" value="1" min="1" required>
            </div>
            <div class="w3-sixth">
              <label>&nbsp;</label>
              <button type="button" class="w3-button sb-button-danger" onclick="removeProduct(1)" style="display:none">Remove</button>
            </div>
          </div>
        </div>
      </div>

      <button type="button" class="w3-button sb-button add-product-btn" onclick="addProduct()">
        <i class="fa fa-plus"></i> Add Another Product
      </button>

      <div class="w3-margin-top">
        <button type="submit" class="w3-button sb-button"><i class="fa fa-save"></i> Save Order</button>
        <a href="/orders" class="w3-button sb-button-warm"><i class="fa fa-times"></i> Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  var mySidebar = document.getElementById("mySidebar");
  var overlayBg = document.getElementById("myOverlay");
  function w3_open() { mySidebar.style.display = "block"; overlayBg.style.display = "block"; }
  function w3_close() { mySidebar.style.display = "none"; overlayBg.style.display = "none"; }

  let productCount = 1;

  function addProduct() {
    productCount++;
    const container = document.getElementById('products-container');
    const newProduct = document.createElement('div');
    newProduct.className = 'product-row';
    newProduct.id = `product-${productCount}`;
    newProduct.innerHTML = `
      <div class="w3-row-padding">
        <div class="w3-half">
          <label>Product</label>
          <select class="w3-select w3-border" name="product_id[]" required>
            <option value="">Select Product</option>
            {% for product in products %}
              <option value="{{ product.id }}">{{ product.name }} (SKU: {{ product.sku }}) - ${{ "%.2f"|format(product.price) }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="w3-third">
          <label>Quantity</label>
          <input class="w3-input w3-border" type="number" name="quantity[]" value="1" min="1" required>
        </div>
        <div class="w3-sixth">
          <label>&nbsp;</label>
          <button type="button" class="w3-button sb-button-danger" onclick="removeProduct(${productCount})">Remove</button>
        </div>
      </div>
    `;
    container.appendChild(newProduct);
  }

  function removeProduct(id) {
    const productDiv = document.getElementById(`product-${id}`);
    if (productDiv) {
      productDiv.remove();
    }
  }
</script>

</body>
</html>
