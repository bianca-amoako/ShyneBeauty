<!DOCTYPE html>
<html>
<head>
  <title>Add Order</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>
    html, body, h1, h2, h3, h4, h5 { font-family: "Raleway", sans-serif; }
    body { background-color: #f6f3ee; color: #4f4a45; }
    .sb-topbar { background: linear-gradient(to right, #e7d8c3, #f3eadc); color: #5f5a54; border-bottom: 2px solid #d7c3aa; }
    .sb-topbar .w3-bar-item { color: #5f5a54 !important; font-weight: 600; }
    .sb-sidebar { background-color: #fcfaf7; color: #5f5a54; border-right: 1px solid #eadfce; }
    .sb-sidebar .w3-bar-item { color: #5f5a54; font-weight: 500; }
    .sb-sidebar .w3-bar-item:hover { background-color: #d7ece8 !important; color: #4c4a46 !important; }
    .sb-active { background-color: #bfe3df !important; color: #4c4a46 !important; font-weight: bold; }
    .sb-panel { background-color: #ffffff; color: #4f4a45; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
    .sb-heading { color: #7c746c; }
    .sb-subtle { color: #7a746d; }
    .sb-button { background-color: #bfe3df; color: #4c4a46; border: none; }
    .sb-button-warm { background-color: #e8d5bd; color: #4c4a46; border: none; }
  </style>
</head>
<body>

<div class="w3-bar w3-top w3-large sb-topbar" style="z-index:4">
  <button class="w3-bar-item w3-button w3-hide-large" onclick="w3_open()"><i class="fa fa-bars"></i> Menu</button>
  <span class="w3-bar-item w3-right">ShyneBeauty</span>
</div>

<nav class="w3-sidebar w3-collapse sb-sidebar w3-animate-left" style="z-index:3;width:300px;" id="mySidebar"><br>
  <div class="w3-container"><h5 class="sb-heading">Dashboard</h5></div>
  <div class="w3-bar-block">
    <a href="/" class="w3-bar-item w3-button w3-padding">Home Dashboard</a>
    <a href="/add-new" class="w3-bar-item w3-button w3-padding sb-active">Add New</a>
  </div>
</nav>

<div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" id="myOverlay"></div>

<div class="w3-main" style="margin-left:300px;margin-top:43px">
  <header class="w3-container" style="padding-top:22px">
    <h3 class="sb-heading"><b><i class="fa fa-shopping-cart"></i> Add Order</b></h3>
    <p class="sb-subtle">Enter new order information below.</p>
  </header>

  <div class="w3-container sb-panel w3-padding w3-margin">
    <label><b>Order ID</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="text" placeholder="Enter order ID">

    <label><b>Customer Name</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="text" placeholder="Enter customer name">

    <label><b>Order Source</b></label>
    <select class="w3-select w3-border w3-margin-bottom">
      <option>Fiverr</option>
      <option>Square</option>
      <option>Google Sheets</option>
      <option>Manual Entry</option>
    </select>

    <label><b>Products</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="text" placeholder="Enter products">

    <label><b>Status</b></label>
    <select class="w3-select w3-border w3-margin-bottom">
      <option>New</option>
      <option>In Progress</option>
      <option>Packed</option>
      <option>Shipped</option>
      <option>Completed</option>
    </select>

    <label><b>Order Date</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="date">

    <label><b>Total</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="text" placeholder="Enter total">

    <button class="w3-button sb-button">Save Order</button>
    <button class="w3-button sb-button-warm">Cancel</button>
  </div>
</div>

<script>
  var mySidebar = document.getElementById("mySidebar");
  var overlayBg = document.getElementById("myOverlay");
  function w3_open() { mySidebar.style.display = "block"; overlayBg.style.display = "block"; }
  function w3_close() { mySidebar.style.display = "none"; overlayBg.style.display = "none"; }
</script>

</body>
</html>
